services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./services/api
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - ai-engine
    ports:
      - "8000:8000"

  ai-engine:
    build:
      context: ./services/ai-engine
    env_file:
      - .env
    ports:
      - "8100:8100"

  student-portal:
    build:
      context: ./apps/student-portal
      args:
        VITE_API_BASE_URL: ${API_BASE_URL}
        VITE_WS_BASE_URL: ${WS_BASE_URL}
    ports:
      - "5173:5173"
    depends_on:
      - api

  admin-dashboard:
    build:
      context: ./apps/admin-dashboard
      args:
        VITE_API_BASE_URL: ${API_BASE_URL}
        VITE_WS_BASE_URL: ${WS_BASE_URL}
    ports:
      - "5174:5174"
    depends_on:
      - api

volumes:
  postgres_data:
